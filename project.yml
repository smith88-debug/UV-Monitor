name: UVMonitor
options:
  bundleIdPrefix: com.uvmonitor
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
settings:
  SWIFT_VERSION: "5.9"
targets:
  UVMonitor:
    type: application
    platform: iOS
    sources:
      - UVMonitor
    info:
      path: UVMonitor/Info.plist
      properties:
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UILaunchScreen: {}
        UISupportedInterfaceOrientations~iphone:
          - UIInterfaceOrientationPortrait
        CFBundleDisplayName: "UV Monitor"
        NSAppTransportSecurity:
          NSExceptionDomains:
            api.open-meteo.com:
              NSExceptionAllowsInsecureHTTPLoads: false
              NSExceptionMinimumTLSVersion: TLSv1.0
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.uvmonitor.app
  UVMonitorTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - UVMonitorTests
    dependencies:
      - target: UVMonitor
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.uvmonitor.app.tests
