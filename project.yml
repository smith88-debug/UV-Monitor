name: UVMonitor
options:
  bundleIdPrefix: com.uvmonitor
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
settings:
  SWIFT_VERSION: "5.9"
  GENERATE_INFOPLIST_FILE: YES
  INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "UVMonitor uses your location to find the nearest UV monitoring station."
  INFOPLIST_KEY_BGTaskSchedulerPermittedIdentifiers: "$(PRODUCT_BUNDLE_IDENTIFIER).uvrefresh"
targets:
  UVMonitor:
    type: application
    platform: iOS
    sources:
      - UVMonitor
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.uvmonitor.app
      INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
      INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
      INFOPLIST_KEY_UILaunchScreen_Generation: YES
      INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
      INFOPLIST_KEY_CFBundleDisplayName: "UV Monitor"
